name: Test Workflow

on: push

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploying
        run: echo "deploying..."